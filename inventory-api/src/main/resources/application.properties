# --- Oracle datasource ---
quarkus.datasource.db-kind=oracle
quarkus.datasource.acquisition-timeout=120
quarkus.datasource.username=system
quarkus.datasource.password=oracle
quarkus.datasource.jdbc.url=jdbc:oracle:thin:@//localhost:1521/FREEPDB1

# --- Hibernate / Flyway ---
quarkus.hibernate-orm.schema-management.strategy=none
# Use VARCHAR/CHAR for UUID columns (Oracle VARCHAR2) - fixes wrong UUID format
quarkus.hibernate-orm.unsupported-properties."hibernate.type.preferred_uuid_jdbc_type"=CHAR
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=db/migration/oracle

# --- CORS ---
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,origin,content-type,authorization